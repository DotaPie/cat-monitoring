# /etc/motion/cam1.conf
#
# This config file was generated by motion 4.5.1
# at 2024-03-20T15:54:40


# User defined name for the camera.
camera_name MyCam1

# Numeric identifier for the camera.
camera_id 101

# Video device (e.g. /dev/video0) to be used for capturing.
video_device /dev/v4l/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.3:1.0-video-index0

# The Motion method to use to change the brightness/exposure on video device.
auto_brightness 1

# Text to be overlayed in the lower left corner of images
text_left CAMERA 1

# Text to be overlayed in the lower right corner of images.
text_right %Y-%m-%d\n%T-%q

# File name(without extension) for movies relative to target directory
movie_filename CAM01_%t-%v-%Y%m%d%H%M%S

############################################################
# Webcontrol configuration parameters
############################################################

# Port number used for the webcontrol.
webcontrol_port 0

############################################################
# Live stream configuration parameters
############################################################

# The port number for the live stream.
stream_port 0


